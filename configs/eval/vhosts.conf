server {
    listen 80;
    host 127.0.0.1;
    server_name example.com;
    root ./www/example;
    index index.html;

    location / {
        methods GET POST;
    }
}

server {
    listen 80;
    host 127.0.0.1;
    server_name other.com;
    root ./www/other;
    index index.html;

    location / {
        methods GET;
    }
}