server {
    listen 8080;
    host 127.0.0.1;
    server_name localhost;
    root ./www;
    index index.html;
    client_max_body_size 100;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        methods GET POST;
        autoindex off;
    }

    location /upload {
        methods GET POST;
        root ./www/upload;
    }
}

server {
    listen 8081;
    host 127.0.0.1;
    server_name localhost;
    root ./www;
    index index.html;

    location / {
        methods GET;
    }
}