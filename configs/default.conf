server {
    listen 8080;
    host localhost;
    root ./www;
    index index.html;

    # Basic location
    location / {
        root ./www;
        methods GET;
    }

    # Multiple methods
    location /api {
        root ./api;
        methods GET POST DELETE;
    }

    # Upload
    location /upload {
        root ./uploads;
        methods POST;
        upload_dir ./uploads;
    }

    # CGI - Python
    location /cgi-bin {
        root ./cgi-bin;
        methods GET POST;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }

    # CGI - only extension set (should trigger your validation error)
    location /cgi-broken {
        cgi_extension .pl;
    }

    # Deeply nested-ish path
    location /static/assets/images {
        root ./static;
        methods GET;
    }

    # No directives at all
    location /empty {
    }

    # Trailing semicolons stress
    location /semicolons {
        root ./www;;;
        methods GET;
    }

    # Unknown directive (should trigger your warn + ignore)
    location /unknown {
        root ./www;
        methods GET;
        foobar baz;
    }
}

# Second server block — tests multi-server parsing
server {
    listen 9090;
    host 127.0.0.1;
    root ./site2;
    index index.htm;

    location / {
        root ./site2;
        methods GET;
    }
}

