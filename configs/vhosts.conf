server {
    listen 8080;
    host 127.0.0.1;
    server_name example.com;
    root ./test;
    index index.html;

    location / {
        root ./test;
        index index.html;
        methods GET POST;
        auto_index true;
    }
}

server {
    listen 8080;
    host 127.0.0.1;
    server_name other.com;
    root ./test;
    index index.html;

    location / {
        root ./test;
        index index.html;
        methods GET POST;
        auto_index true;
    }
}