server {
    listen 8080;
    host localhost;
    root ./;
    index index.html;

    # /post_body must answer to POST request with maxBody of 100
    location /post_body {
        root ./;
        methods GET POST DELETE;
        client_max_body_size 100;
    }

    # /directory/ must answer to GET and search for youpi.bad_extension files
    location /directory {
        root ./YoupiBanane;
        methods GET;
        index youpi.bad_extension;
        auto_index true;
    }

    # / must answer to GET request ONLY, but .bla files use POST with CGI
    location / {
        root ./;
        methods GET POST;
        index index.html;
        cgi_extension .bla;
        cgi_path ./cgi_tester;
    }
}
